## Add your filters / logstash plugins configuration here
filter {
        # Zipkin 트레이스 데이터 처리
        if [type] == "zipkin" {
                # Zipkin 전용 인덱스 설정
                mutate {
                        add_field => { "[@metadata][target_index]" => "zipkin-traces-%{+YYYY.MM.dd}" }
                }

                # 타임스탬프 처리 (마이크로초를 밀리초로 변환)
                if [timestamp] {
                        ruby {
                                code => "
                                        timestamp_us = event.get('timestamp')
                                        if timestamp_us.is_a?(Numeric)
                                                timestamp_ms = timestamp_us / 1000
                                                event.set('@timestamp', Time.at(timestamp_ms / 1000.0))
                                        end
                                "
                        }
                }

                # 서비스명 정규화
                if [localEndpoint][serviceName] {
                        mutate {
                                add_field => { "serviceName" => "%{[localEndpoint][serviceName]}" }
                        }
                }

                # 스팬 이름 정규화
                if [name] {
                        mutate {
                                add_field => { "operationName" => "%{name}" }
                        }
                }

                # 지속시간을 밀리초로 변환
                if [duration] {
                        ruby {
                                code => "
                                        duration_us = event.get('duration')
                                        if duration_us.is_a?(Numeric)
                                                duration_ms = duration_us / 1000.0
                                                event.set('duration_ms', duration_ms)
                                        end
                                "
                        }
                }

                # 불필요한 필드 제거
                mutate {
                        remove_field => ["host", "headers"]
                }
        } else if [type] == "kafka" {
                # Kafka 데이터 처리
                mutate {
                        add_field => { "[@metadata][target_index]" => "kafka-logs-%{+YYYY.MM.dd}" }
                }

                # 타임스탬프 처리
                if [timestamp] {
                        date {
                                match => [ "timestamp", "ISO8601", "UNIX", "UNIX_MS" ]
                                target => "@timestamp"
                        }
                }

                # 로그 레벨 정규화
                if [level] {
                        mutate {
                                uppercase => [ "level" ]
                        }
                }

                # 서비스명 추가
                if ![service] and [logger] {
                        mutate {
                                add_field => { "service" => "%{logger}" }
                        }
                }
        } else {
                # 기존 Redis 트랜잭션 데이터 처리
                # (선택적) 데이터 필터링 및 전처리를 수행할 수 있습니다.
                # if [service] == "" or [_docId] == "" or [event] ==  "" {
                #         drop {}
                # }

                mutate {
                        add_field => { "[@metadata][target_index]" => "%{_index}" }

                        # docId 를 생성받을경우 @metadata 속성을 이용하여 처리
                        # doc_id 는 되도록이면 자동생성하는게 성능에 도움됨
                        # add_field => { "[@metadata][doc_id]" => "%{_docId}%{}" }
                }

                mutate {
                        remove_field => ["[event][original]","_index"]
                }
        }
}

output {
        # Zipkin 트레이스 데이터 출력
        if [type] == "zipkin" {
                elasticsearch {
                        hosts => "elasticsearch:9200"
                        user => "logstash_internal"
                        password => "${LOGSTASH_INTERNAL_PASSWORD}"
                        index => "%{[@metadata][target_index]}"
                        template => "/usr/share/logstash/config/zipkin-template.json"
                        template_name => "zipkin-template"
                        template_overwrite => true
                        manage_template => true
                }
        } else if [type] == "kafka" {
                # Kafka 데이터 출력
                elasticsearch {
                        hosts => "elasticsearch:9200"
                        user => "logstash_internal"
                        password => "${LOGSTASH_INTERNAL_PASSWORD}"
                        index => "%{[@metadata][target_index]}"
                }
        } else {
                # 기존 트랜잭션 데이터 출력
                elasticsearch {
                        hosts => "elasticsearch:9200"
                        user => "logstash_internal"
                        password => "${LOGSTASH_INTERNAL_PASSWORD}"
                        index => "%{[@metadata][target_index]}"
                        # doc_as_upsert => true
                        # document_id => "%{[@metadata][doc_id]}"
                        # template => "/usr/share/logstash/config/log-template.json"
                        # manage_template => false
                }
        }
}