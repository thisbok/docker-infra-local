input {
	 redis {
                host => "redis"
                codec => "json"
                data_type => "list"
                key => "transactions"
        }

        # Zipkin 트레이스 데이터 입력
        beats {
                port => 5045
                type => "zipkin"
        }

        # HTTP input for Zipkin traces
        http {
                port => 9412
                codec => "json"
                type => "zipkin"
        }

        # Kafka input for log events
        kafka {
                bootstrap_servers => "kafka:29092"
                topics => ["logs", "events", "metrics"]
                group_id => "logstash_consumer"
                codec => "json"
                type => "kafka"
                consumer_threads => 3
        }
}

